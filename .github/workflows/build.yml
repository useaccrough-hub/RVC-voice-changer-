name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Unzip project
        run: unzip RVCVoiceChanger.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: cd RVCVoiceChanger && chmod +x gradlew

      - name: Build APK
        run: cd RVCVoiceChanger && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: RVC-VoiceChanger-APK
          path: RVCVoiceChanger/app/build/outputs/apk/debug/app-debug.apk
